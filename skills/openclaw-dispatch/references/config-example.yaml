# ~/.dispatch/config.yaml — OpenClaw Dispatch Configuration
#
# Generated by openclaw-dispatch on first run.
# Edit manually or use: "config: change <setting>"

# Default worker model (claude / opus / sonnet / haiku)
default: claude

# Worker CLI backends
backends:
  claude:
    command: >
      env -u CLAUDE_CODE_ENTRYPOINT -u CLAUDECODE
      claude -p --dangerously-skip-permissions

# Available models (Claude Code manages model selection internally)
models:
  claude: { backend: claude }
  opus:   { backend: claude }
  sonnet: { backend: claude }
  haiku:  { backend: claude }

# OpenClaw integration settings
openclaw:
  # OpenClaw gateway URL (from openclaw.json gateway.port)
  gateway_url: "http://127.0.0.1:18789"

  # Auth token (from openclaw.json gateway.auth.token)
  gateway_token: "replace-with-your-token"

  # Default project directory for dispatched workers.
  # Can be overridden per-dispatch by mentioning the path in your message.
  default_project: "/Users/yourname/.openclaw/agents/coding/projects/myapp"

  # Notification target: where Feishu/Discord messages are sent.
  notify:
    # "feishu" or "discord"
    channel: "feishu"

    # OpenClaw account ID (usually "main")
    account_id: "default"

    # Feishu group ID or Discord channel ID
    # Find in openclaw.json → bindings → agentId: "coding" → match.peer.id
    to: "oc_replace_with_your_feishu_group_id"
